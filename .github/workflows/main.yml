name: Build Android APK

on:
  push:
    branches:
      - main  # Asegúrate de que este sea el nombre de tu rama principal
  workflow_dispatch: # Esto te permite ejecutarlo manualmente si quieres

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código de tu repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configura Java (necesario para compilar Android)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Configura Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x' # Usa la versión estable más reciente
          channel: 'stable'

      # 4. Obtiene las dependencias de tu proyecto
      - name: Install dependencies
        run: flutter pub get

      # 5. Compila el APK en modo Release
      - name: Build APK
        run: flutter build apk --release

      # 6. Sube el archivo a los Artifacts (Versión v4 corregida)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mi-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
